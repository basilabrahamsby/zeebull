server {
    server_name 34.162.60.52 zeebull.com www.zeebull.com;
    client_max_body_size 50M;

    # 1. User End Portal (Root)
    location / {
        root /var/www/zeebull/userend/build;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. Admin Dashboard
    location ^~ /zeebulladmin {
        alias /var/www/zeebull/dasboard/build;
        try_files $uri $uri/ /zeebulladmin/index.html;
    }

    # 3. Backend API Reverse Proxy (zeebullapi)
    location ^~ /zeebullapi/ {
        proxy_pass http://127.0.0.1:8011/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # NEW: Standard Backend API Reverse Proxy (api)
    location /api/ {
        proxy_pass http://127.0.0.1:8011;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 4. Static Files / Uploads
    location ^~ /zeebullfiles/uploads/ {
        alias /var/www/zeebull/ResortApp/uploads/;
    }

    location ^~ /zeebullfiles/ {
        alias /var/www/zeebull/ResortApp/uploads/;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/zeebull.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/zeebull.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.zeebull.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = zeebull.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name 34.162.60.52 zeebull.com www.zeebull.com;
    return 404; # managed by Certbot
}

